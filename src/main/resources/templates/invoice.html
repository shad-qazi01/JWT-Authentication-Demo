<!DOCTYPE html>
<html>
<body>
<h2>SmartBiz Invoice</h2>

<p>Invoice ID: {{id}}</p>
<p>Client ID: {{clientId}}</p>

<table border="1" width="100%">
    <tr><th>Amount</th><th>Tax</th><th>Total</th></tr>
    <tr>
        <td>{{amount}}</td>
        <td>{{tax}}%</td>
        <td>{{total}}</td>
    </tr>
</table>

<p>Status: {{status}}</p>
<p>Due Date: {{dueDate}}</p>

</body>
</html>
